name: CI
on: [push, pull_request]
jobs:
  firmware-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make -C firmware test
  ros2-tests:
    runs-on: ubuntu-latest
    container: ros:humble
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_ws
          colcon build
          colcon test
          colcon test-result --verbose
